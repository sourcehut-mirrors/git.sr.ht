query GetRepoAccessSettings($user: String!, $repo: String!, $aclCursor: Cursor, $keyCursor: Cursor) {
  user(username: $user) {
    canonicalName
    username
    repository(name: $repo) {
      rid
      name
      acls(cursor: $aclCursor) {
        cursor
        results {
          id
          created
          mode
          entity {
              canonicalName

              ... on User {
                username
              }
          }
        }
      }
      deployKeys(cursor: $keyCursor) {
        cursor
        results {
          rid
          key
          keyType
          fingerprintSHA256
          comment
          created
          lastUsed
          access
        }
      }
    }
  }
}
