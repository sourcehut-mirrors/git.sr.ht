mutation CreateRepository(
  $name: String!,
  $visibility: Visibility!,
  $description: String,
) {
  repository: createRepository(
    name: $name,
    visibility: $visibility,
    description: $description
  ) {
    name
  }
}

mutation CloneRepository(
  $cloneUrl: String!,
  $name: String!,
  $visibility: Visibility!,
  $description: String,
) {
  repository: createRepository(
    name: $name,
    visibility: $visibility,
    description: $description,
    cloneUrl: $cloneUrl,
  ) {
    name
  }
}

mutation RenameRepository($id: Int!, $name: String!) {
  repository: updateRepository(id: $id, input: {name: $name}) {
    name
  }
}

mutation UpdateRepository($id: Int!, $input: RepoInput!) {
  updateRepository(id: $id, input: $input) { id }
}

mutation DeleteRepository($id: Int!) {
  repository: deleteRepository(id: $id) {
    id
    name
    owner {
      canonicalName

      ... on User {
        username
      }
    }
  }
}

fragment acl on ACL {
  id
  created
  mode
  entity {
      __typename
      canonicalName

      ... on User {
        username
      }
  }
}

query GetDeployKeys($rid: ID!, $cursor: Cursor) {
  repository(rid: $rid) {
    deployKeys(cursor: $cursor) {
      cursor
      results { ...sshkey }
    }
  }
}

fragment sshkey on SSHKey {
  rid
  key
  keyType
  fingerprintSHA256
  comment
  created
  lastUsed
  access
}

mutation CreateDeployKey($repo: ID!, $mode: AccessMode!, $key: String!) {
  createDeployKey(repo: $repo, mode: $mode, key: $key) {
    rid
  }
}

mutation DeleteDeployKey($rid: ID!) {
  deleteDeployKey(rid: $rid) {
    rid
  }
}
